server {

    listen 80;

    server_name your-domain.com;

    # Vue
    location / {
        proxy_pass http://frontend:80;
    }

    # REST API
    location /api/ {
        proxy_pass http://backend:8080;
    }


    # WebSocket
    location /ws/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }


    # Swagger
    location /swagger-ui/ {
        proxy_pass http://backend:8080;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080;
    }

}