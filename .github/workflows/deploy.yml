name: Deploy to EC2

on:
  workflow_run:
    workflows:
      - Backend Test
    types:
      - completed

jobs:
  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-037e99cc52d645d23 \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Board App" \
            --parameters 'commands=[
              "sudo -u ubuntu -H bash -lc \"cd /home/ubuntu/bord-app-form && git fetch origin main --prune && git reset --hard origin/main && git log --oneline -3\"",
              "sudo -u ubuntu -H bash -lc \"cd /home/ubuntu/bord-app-form && docker compose -f docker-compose.prod.yml down\"",
              "sudo -u ubuntu -H bash -lc \"cd /home/ubuntu/bord-app-form && docker compose -f docker-compose.prod.yml build backend\"",
              "sudo -u ubuntu -H bash -lc \"cd /home/ubuntu/bord-app-form && docker compose -f docker-compose.prod.yml build frontend\"",
              "sudo -u ubuntu -H bash -lc \"cd /home/ubuntu/bord-app-form && docker compose -f docker-compose.prod.yml up -d\""
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          while true
          do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id i-037e99cc52d645d23 \
              --query "Status" \
              --output text)

            echo "SSM Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then

              echo "STDOUT:"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id i-037e99cc52d645d23 \
                --query "StandardOutputContent" \
                --output text

              echo "STDERR:"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id i-037e99cc52d645d23 \
                --query "StandardErrorContent" \
                --output text

              break
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then

              echo "STDOUT:"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id i-037e99cc52d645d23 \
                --query "StandardOutputContent" \
                --output text

              echo "STDERR:"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id i-037e99cc52d645d23 \
                --query "StandardErrorContent" \
                --output text

              exit 1
            fi

            sleep 10
          done